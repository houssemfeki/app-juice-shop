apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop

spec:
  replicas: 2
  selector:
    matchLabels:
      app: juiceshop

  template:
    metadata:
      labels:
        app: juiceshop

    spec:
      containers:
        - name: juiceshop
          image: registry.local:5443/juiceshop:latest
          ports:
            - containerPort: 3000

      imagePullSecrets:
        - name: registry-credentials
